
services:

  dbr-db:
    image: timescale/timescaledb:latest-pg16
    container_name: dbr-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: dbr_db
      POSTGRES_USER: dbradmin
      POSTGRES_PASSWORD: "dbradmin123"
      POSTGRES_HOST_AUTH_METHOD: trust

    ports:
      - "5435:5432"

    volumes:
      - dbr-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbradmin -d dbr_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - backend-network

  dbr-api:
    build:
      context: ./api
      dockerfile: Dockerfile

    container_name: dbr-api
    restart: unless-stopped

    env_file:
      - ./api/.env

    environment:
      - MTE_DB_PASSWORD=postgres123

    ports:
      - "8010:8010"

    depends_on:
      dbr-db:
        condition: service_healthy

    healthcheck:
      test: python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - backend-network

volumes:
  dbr-db-data:

networks:
  backend-network:
    external: true

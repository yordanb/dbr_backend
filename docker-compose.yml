services:

  dbr-db:
    image: timescale/timescaledb:latest-pg16
    container_name: dbr-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME:-dbr_db}
      POSTGRES_USER: ${DB_USER:-dbradmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dbrpassword}

    ports:
      - "5435:5432"

    volumes:
      - dbr-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dbradmin} -d ${DB_NAME:-dbr_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - backend-network

  dbr-api:
    build:
      context: ./api
      dockerfile: Dockerfile

    container_name: dbr-api
    restart: unless-stopped

    env_file:
      - ./api/.env

    ports:
      - "8010:8010"

    depends_on:
      dbr-db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - backend-network

volumes:
  dbr-db-data:

networks:
  backend-network:
    external: true
